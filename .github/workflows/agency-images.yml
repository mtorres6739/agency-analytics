name: Agency immutable images

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            shared/package-lock.json
            server/package-lock.json
            client/package-lock.json
      - run: npm ci && npm run build
        working-directory: shared
      - run: npm ci && npm run test:run -- src/api/agency && npm run build
        working-directory: server
      - run: npm ci && npx tsc --noEmit && npm run build
        working-directory: client

  publish:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: client
            dockerfile: client/Dockerfile
          - name: backend
            dockerfile: server/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Normalize owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/${{ env.OWNER }}/agency-analytics-${{ matrix.name }}:${{ github.sha }}
          platforms: linux/amd64
          provenance: true
          sbom: true

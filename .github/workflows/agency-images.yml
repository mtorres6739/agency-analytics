name: Agency immutable images

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            shared/package-lock.json
            server/package-lock.json
            client/package-lock.json
      - run: npm ci && npm run build
        working-directory: shared
      - run: npm ci && npm audit --omit=dev --audit-level=high
        working-directory: server
      - run: npm run test:run -- src/lib/auth-middleware.test.ts src/lib/authContentTypeParsers.test.ts src/api/agency src/api/identity src/api/sites/addSite.test.ts src/api/sites/deleteSite.test.ts src/api/sites/resolutionIdentity.test.ts src/services/tracker/trackEvent.test.ts src/services/trackingDeployment src/services/identity src/services/identityResolution src/analytics-script/config.test.ts src/analytics-script/identityConsent.test.ts src/analytics-script/tracking.test.ts && npm run build && npm run db:check
        working-directory: server
      - run: npm ci && npm audit --omit=dev --audit-level=high && npm run lint && npm run test:proxy && npx tsc --noEmit && npm run build
        working-directory: client
      - run: bash -n infra/agency/deploy.sh infra/agency/backup.sh infra/agency/restore.sh infra/agency/install-backup-timer.sh
      - run: docker compose --env-file infra/agency/.env.production.example -f docker-compose.yml -f infra/agency/docker-compose.production.yml config --quiet

  publish:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - name: client
            dockerfile: client/Dockerfile
            build_args: |
              NEXT_PUBLIC_BACKEND_URL=https://analytics.myfusionadmin.com
              NEXT_PUBLIC_DISABLE_SIGNUP=true
              NEXT_PUBLIC_LITE_DASHBOARD=false
              NEXT_PUBLIC_DEPLOYMENT=agency
          - name: backend
            dockerfile: server/Dockerfile
            build_args: ""
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Normalize owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build_args }}
          push: true
          tags: ghcr.io/${{ env.OWNER }}/agency-analytics-${{ matrix.name }}:${{ github.sha }}
          platforms: linux/amd64
          provenance: true
          sbom: true

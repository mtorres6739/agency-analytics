name: Production smoke monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify API health
        run: curl --fail --show-error --silent --retry 3 --retry-all-errors --max-time 15 https://analytics.boldmedia.cc/api/health
      - name: Verify application shell and security headers
        run: |
          headers="$(curl --fail --show-error --silent --retry 3 --retry-all-errors --max-time 15 --head https://analytics.boldmedia.cc/login)"
          grep -qi '^strict-transport-security:' <<< "$headers"
          grep -qi '^content-security-policy:' <<< "$headers"
          grep -qi '^x-content-type-options: nosniff' <<< "$headers"

services:
  caddy:
    profiles: !reset []
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
      - LEGACY_DOMAIN_NAME=${LEGACY_DOMAIN_NAME}
    volumes: !override
      - ./infra/agency/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    logging:
      options:
        max-size: 10m
        max-file: "5"

  clickhouse:
    ports: !reset []
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - agency-backups:/backups
    configs:
      - source: agency_clickhouse_backup
        target: /etc/clickhouse-server/config.d/backup.xml
    logging:
      options:
        max-size: 50m
        max-file: "5"

  postgres:
    ports: !reset []
    logging:
      options:
        max-size: 10m
        max-file: "5"

  redis:
    ports: !reset []
    logging:
      options:
        max-size: 10m
        max-file: "5"

  backend:
    image: ghcr.io/${GHCR_OWNER}/agency-analytics-backend:${IMAGE_TAG}
    build: !reset null
    ports: !reset []
    environment:
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_REGION=${S3_REGION}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - REPORTS_BUCKET=${REPORTS_BUCKET}
      - REPORTS_PREFIX=${REPORTS_PREFIX}
      - APP_NAME=${APP_NAME}
      - ENFORCE_AGENCY_TWO_FACTOR=${ENFORCE_AGENCY_TWO_FACTOR}
      - TRACKING_INSTALLER_ENABLED=${TRACKING_INSTALLER_ENABLED}
      - TRACKING_AUTO_DEPLOY_ENABLED=${TRACKING_AUTO_DEPLOY_ENABLED}
      - TRACKING_ANALYTICS_ORIGIN=${TRACKING_ANALYTICS_ORIGIN}
      - TRACKING_PATH_PREFIX=${TRACKING_PATH_PREFIX}
      - TRACKING_WORKER_PREFIX=${TRACKING_WORKER_PREFIX}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - CF_ACCOUNT_ID=${CF_ACCOUNT_ID}
      - VERCEL_TOKEN=${VERCEL_TOKEN}
      - VERCEL_TEAM_ID=${VERCEL_TEAM_ID}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - IDENTITY_KEY_ENCRYPTION_SECRET=${IDENTITY_KEY_ENCRYPTION_SECRET}
      - IDENTITY_BLOCKED_DOMAINS=${IDENTITY_BLOCKED_DOMAINS}
    logging:
      options:
        max-size: 25m
        max-file: "5"

  client:
    image: ghcr.io/${GHCR_OWNER}/agency-analytics-client:${IMAGE_TAG}
    build: !reset null
    ports: !reset []
    logging:
      options:
        max-size: 10m
        max-file: "5"

volumes:
  agency-backups:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${AGENCY_BACKUP_PATH:-/srv/agency-backups}

configs:
  agency_clickhouse_backup:
    file: ./infra/agency/clickhouse-backup.xml
